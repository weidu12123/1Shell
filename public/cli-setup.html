<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1Shell AI CLI 接入 · 2.0.0-dev</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            shell: {
              panel: '#f8fafc',
              'panel-dark': '#111827',
              accent: '#4f8cff',
              purple: '#7c3aed',
              cyan: '#06b6d4',
            },
          },
          fontFamily: {
            mono: ['"Cascadia Code"', '"JetBrains Mono"', '"Fira Code"', 'Consolas', 'monospace'],
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

    /* ── CLI 卡片 ──────────────────────────────────────── */
    .cli-card {
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      border: 1px solid #e2e8f0;
    }
    .cli-card:hover {
      transform: translateY(-2px);
      border-color: rgba(6,182,212,0.5);
      box-shadow: 0 8px 24px rgba(6,182,212,0.12);
    }
    .cli-card.connected { border-color: rgba(5,150,105,0.5); }

    /* ── 状态徽章 ──────────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 600;
    }
    .status-connected { background: rgba(5,150,105,0.12); color: #059669; border: 1px solid rgba(5,150,105,0.3); }
    .status-detected  { background: rgba(6,182,212,0.12); color: #06b6d4; border: 1px solid rgba(6,182,212,0.3); }
    .status-missing   { background: rgba(148,163,184,0.15); color: #64748b; border: 1px solid rgba(148,163,184,0.3); }
    .status-error     { background: rgba(239,68,68,0.12); color: #dc2626; border: 1px solid rgba(239,68,68,0.3); }

    .nav-link.active {
      background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(59,130,246,0.15));
      color: #06b6d4;
      border-color: rgba(6,182,212,0.35);
    }

    /* ── 全局左侧活动栏（类 1Panel） ─────────────────────── */
    .app-sidebar {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      box-shadow: 2px 0 12px rgba(0,0,0,0.15);
    }
    .dark .app-sidebar {
      background: linear-gradient(180deg, #0b0e18 0%, #050810 100%);
    }
    .side-nav-item {
      position: relative;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .side-nav-item:hover {
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
    }
    .side-nav-item.active {
      background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(59,130,246,0.22));
      color: #67e8f9;
    }
    .side-nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 10px; bottom: 10px; width: 3px;
      background: linear-gradient(180deg, #06b6d4, #3b82f6);
      border-radius: 0 3px 3px 0;
      box-shadow: 0 0 8px rgba(6,182,212,0.5);
    }

    /* ── 进度步骤 ──────────────────────────────────────── */
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      background: #f1f5f9; color: #94a3b8;
      border: 2px solid #e2e8f0;
      transition: all 0.2s;
    }
    .step-dot.done { background: #10b981; color: white; border-color: #10b981; }
    .step-dot.active { background: #06b6d4; color: white; border-color: #06b6d4; box-shadow: 0 0 0 4px rgba(6,182,212,0.15); }
    .step-line { flex: 1; height: 2px; background: #e2e8f0; }
    .step-line.done { background: #10b981; }

    /* ── 暗色 ──────────────────────────────────────────── */
    .dark body { color: #e2e8f0; }
    .dark .topbar, .dark .main-panel { @apply bg-[#111827] border-[#1e293b]; }
    .dark input, .dark textarea, .dark select { @apply bg-[#0b1324] border-[#1e293b] text-slate-200; }
    .dark .cli-card { @apply bg-[#0b1324] border-[#1e293b]; }
    .dark .cli-card.connected { border-color: rgba(5,150,105,0.45); }
    .dark .step-dot { background: #1e293b; color: #64748b; border-color: #334155; }
    .dark .step-line { background: #334155; }
    .dark .nav-link.active {
      background: linear-gradient(135deg, rgba(6,182,212,0.25), rgba(59,130,246,0.20));
      color: #67e8f9;
      border-color: rgba(6,182,212,0.45);
    }
  </style>
</head>
<body class="bg-slate-700 dark:bg-[#0b0e18] w-screen h-screen overflow-hidden text-sm text-slate-700 dark:text-slate-200">

  <div class="flex w-full h-full">

    <!-- ════════════════════════════════════════════════════
         全局左侧活动栏（类 1Panel）
         ════════════════════════════════════════════════════ -->
    <aside class="app-sidebar shrink-0 w-16 flex flex-col items-stretch py-3">
      <!-- Logo -->
      <a href="index.html" class="shrink-0 mx-auto mb-3 w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center text-white font-extrabold text-sm shadow-lg hover:shadow-blue-500/40 transition-all" title="1Shell 2.0">1S</a>

      <div class="mx-3 h-px bg-slate-700/60 mb-2"></div>

      <!-- 主导航 -->
      <nav class="flex flex-col flex-1 gap-1 px-1">
        <a href="index.html" class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium" title="主控台">
          <span class="text-lg">🖥</span>
          <span>主控</span>
        </a>
        <a href="scripts.html" class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium" title="脚本库">
          <span class="text-lg">📜</span>
          <span>脚本</span>
        </a>
        <a href="cli-setup.html" class="side-nav-item active flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium" title="AI CLI 接入">
          <span class="text-lg">⚡</span>
          <span>接入</span>
        </a>
        <a href="#" class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium opacity-50" title="探针（P1）">
          <span class="text-lg">📡</span>
          <span>探针</span>
        </a>
        <a href="#" class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium opacity-50" title="审计日志（P1）">
          <span class="text-lg">📋</span>
          <span>审计</span>
        </a>
      </nav>

      <!-- 底部：设置 / 主题 -->
      <div class="shrink-0 flex flex-col gap-1 px-1">
        <div class="mx-3 h-px bg-slate-700/60 mb-1"></div>
        <button class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium" title="主题切换" id="theme-toggle-btn">
          <span class="text-base" id="theme-icon">☀</span>
          <span>主题</span>
        </button>
        <button class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium" title="设置">
          <span class="text-base">⚙</span>
          <span>设置</span>
        </button>
      </div>
    </aside>

    <!-- ════════════════════════════════════════════════════
         右侧主区域
         ════════════════════════════════════════════════════ -->
    <div class="flex flex-col flex-1 min-w-0 p-2 gap-2">

    <!-- ════════════════════════════════════════════════════
         顶栏
         ════════════════════════════════════════════════════ -->
    <header class="topbar shrink-0 h-14 flex items-center px-5 bg-shell-panel rounded-2xl border border-slate-200 shadow-sm">
      <!-- 左：页面标题 -->
      <div class="flex items-center gap-3 shrink-0">
        <span class="text-2xl">⚡</span>
        <div>
          <div class="text-base font-bold text-slate-700 dark:text-slate-200 flex items-center gap-1.5">
            AI CLI 一键接入
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-cyan-100 text-cyan-600 dark:bg-cyan-500/20 dark:text-cyan-300 font-semibold">BETA</span>
          </div>
          <div class="text-[11px] text-slate-400">将本地 AI CLI 工具接入 1Shell MCP / Bridge</div>
        </div>
      </div>

      <!-- 中：占位 -->
      <div class="flex-1"></div>

      <!-- 右：操作按钮 -->
      <div class="topbar-actions flex items-center gap-2 shrink-0">
        <button class="h-8 px-3 rounded-lg border border-cyan-200 bg-cyan-50 text-xs font-semibold text-cyan-600 hover:border-cyan-400 hover:bg-cyan-100 transition-all" id="rescan-btn">🔄 重新扫描</button>
      </div>
    </header>

    <!-- ════════════════════════════════════════════════════
         主内容区
         ════════════════════════════════════════════════════ -->
    <div class="main-content flex flex-1 gap-2 min-h-0">

      <!-- ─── 左栏：连接信息 / 诊断（动态渲染） ──────────── -->
      <aside class="main-panel w-80 shrink-0 flex flex-col bg-shell-panel rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-4 py-3 border-b border-slate-100">
          <div class="text-[10px] font-semibold text-slate-400 uppercase tracking-wide">1Shell 接入端点</div>
          <div class="mt-1 text-xs text-slate-500">供 AI CLI / MCP 客户端连接</div>
        </div>
        <div id="endpoints-area" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
          <div class="text-center text-slate-400 text-xs py-8">加载中...</div>
        </div>
      </aside>

      <!-- ─── 右栏：CLI 列表（动态渲染） ──────────────────── -->
      <main class="main-panel flex-1 flex flex-col min-w-0 bg-shell-panel rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <!-- 筛选栏 -->
        <div class="shrink-0 flex items-center justify-between px-5 py-3 border-b border-slate-100">
          <div id="filter-bar" class="flex items-center gap-1.5">
            <button class="filter-btn active h-7 px-3 rounded-full border border-cyan-300 bg-cyan-50 text-cyan-600 text-[11px] font-semibold" data-filter="all">全部</button>
            <button class="filter-btn h-7 px-3 rounded-full border border-slate-200 bg-slate-50 text-slate-500 text-[11px] hover:border-cyan-300 hover:text-cyan-500" data-filter="connected">已接入</button>
            <button class="filter-btn h-7 px-3 rounded-full border border-slate-200 bg-slate-50 text-slate-500 text-[11px] hover:border-cyan-300 hover:text-cyan-500" data-filter="detected">已检测</button>
            <button class="filter-btn h-7 px-3 rounded-full border border-slate-200 bg-slate-50 text-slate-500 text-[11px] hover:border-cyan-300 hover:text-cyan-500" data-filter="missing">未安装</button>
          </div>
          <input id="cli-search" type="text" placeholder="搜索 CLI 工具…" class="w-56 h-8 px-3 rounded-lg border border-slate-200 bg-slate-50 text-xs outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-100" />
        </div>

        <!-- CLI 卡片列表 -->
        <div id="cli-list" class="flex-1 overflow-y-auto p-5">
          <div class="text-center text-slate-400 text-xs py-12">扫描中...</div>
        </div>
      </main>
    </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="cli-setup-page.js"></script>
  <script>
    // 主题切换
    const themeBtn = document.getElementById('theme-toggle-btn');
    const themeIcon = document.getElementById('theme-icon');
    const htmlEl = document.documentElement;
    if (localStorage.getItem('1shell-theme') === 'dark') {
      htmlEl.classList.add('dark');
      themeIcon.textContent = '☀';
    } else {
      themeIcon.textContent = '🌙';
    }
    themeBtn.addEventListener('click', () => {
      const isDark = htmlEl.classList.toggle('dark');
      themeIcon.textContent = isDark ? '☀' : '🌙';
      localStorage.setItem('1shell-theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
