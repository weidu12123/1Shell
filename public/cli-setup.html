  <style type="text/tailwindcss">
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

    /* ── CLI 卡片 ──────────────────────────────────────── */
    .cli-card {
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      border: 1px solid #e2e8f0;
    }
    .cli-card:hover {
      transform: translateY(-2px);
      border-color: rgba(6,182,212,0.5);
      box-shadow: 0 8px 24px rgba(6,182,212,0.12);

    /* ── 状态徽章 ──────────────────────────────────────── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 600;
    }
    .status-connected, .status-sandboxed { background: rgba(5,150,105,0.12); color: #059669; border: 1px solid rgba(5,150,105,0.3); }
    .status-detected  { background: rgba(6,182,212,0.12); color: #06b6d4; border: 1px solid rgba(6,182,212,0.3); }
    .status-missing   { background: rgba(148,163,184,0.15); color: #64748b; border: 1px solid rgba(148,163,184,0.3); }
    .status-error     { background: rgba(239,68,68,0.12); color: #dc2626; border: 1px solid rgba(239,68,68,0.3); }

    .nav-link.active {
      background: linear-gradient(135deg, rgba(6,182,212,0.15), rgba(59,130,246,0.15));
      color: #06b6d4;
      border-color: rgba(6,182,212,0.35);
    }

    /* ── 全局左侧活动栏（类 1Panel） ─────────────────────── */
    .app-sidebar {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      box-shadow: 2px 0 12px rgba(0,0,0,0.15);
    }
    .dark .app-sidebar {
      background: linear-gradient(180deg, #0b0e18 0%, #050810 100%);
    }
    .side-nav-item {
      position: relative;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .side-nav-item:hover {
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
    }
    .side-nav-item.active {
      background: linear-gradient(135deg, rgba(6,182,212,0.22), rgba(59,130,246,0.22));
      color: #67e8f9;
    }
    .side-nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 10px; bottom: 10px; width: 3px;
      background: linear-gradient(180deg, #06b6d4, #3b82f6);
      border-radius: 0 3px 3px 0;
      box-shadow: 0 0 8px rgba(6,182,212,0.5);
    }

    /* ── 进度步骤 ──────────────────────────────────────── */
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      background: #f1f5f9; color: #94a3b8;
      border: 2px solid #e2e8f0;
      transition: all 0.2s;
    }
    .step-dot.done { background: #10b981; color: white; border-color: #10b981; }
    .step-dot.active { background: #06b6d4; color: white; border-color: #06b6d4; box-shadow: 0 0 0 4px rgba(6,182,212,0.15); }
    .step-line { flex: 1; height: 2px; background: #e2e8f0; }
    .step-line.done { background: #10b981; }

    /* ── 暗色 ──────────────────────────────────────────── */
    .dark body { color: #e2e8f0; }
    .dark .topbar, .dark .main-panel { @apply bg-[#111827] border-[#1e293b]; }
    .dark input, .dark textarea, .dark select { @apply bg-[#0b1324] border-[#1e293b] text-slate-200; }
    .dark .cli-card { @apply bg-[#0b1324] border-[#1e293b]; }
    .dark .cli-card.connected { border-color: rgba(5,150,105,0.45); }
    .dark .step-dot { background: #1e293b; color: #64748b; border-color: #334155; }
    .dark .step-line { background: #334155; }
    .dark .nav-link.active {
      background: linear-gradient(135deg, rgba(6,182,212,0.25), rgba(59,130,246,0.20));
      color: #67e8f9;
      border-color: rgba(6,182,212,0.45);
    }
  </style>

  <script>
    // 主题切换
    const themeBtn = document.getElementById('theme-toggle-btn');
    const themeIcon = document.getElementById('theme-icon');
    const htmlEl = document.documentElement;
    if (localStorage.getItem('1shell-theme') === 'dark') {
      htmlEl.classList.add('dark');
      themeIcon.textContent = '☀';
    } else {
      themeIcon.textContent = '🌙';
    }
    themeBtn.addEventListener('click', () => {
      const isDark = htmlEl.classList.toggle('dark');
      themeIcon.textContent = isDark ? '☀' : '🌙';
      localStorage.setItem('1shell-theme', isDark ? 'dark' : 'light');
    });
  </script>
