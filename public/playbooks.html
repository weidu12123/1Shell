<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <script>if(localStorage.getItem("1shell-theme")==="dark"||(window.matchMedia&&!localStorage.getItem("1shell-theme")&&window.matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark")}</script><!-- theme-flash-prevent -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            shell: {
              panel: '#f8fafc',
              'panel-dark': '#111827',
              accent: '#4f8cff',
              purple: '#7c3aed',
              cyan: '#06b6d4',
              success: '#059669',
              warn: '#d97706',
              danger: '#dc2626',

  <style type="text/tailwindcss">
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

    /* ── Skill 卡片 ────────────────────────────────────── */
    .skill-card {
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      border: 1px solid #e2e8f0;
      cursor: pointer;
    }
    .skill-card:hover {
      transform: translateY(-2px);
      border-color: rgba(79,140,255,0.5);
      box-shadow: 0 8px 24px rgba(79,140,255,0.12);
    }
    .skill-card.active {
      border-color: rgba(79,140,255,0.6);
      box-shadow: 0 0 0 1px rgba(79,140,255,0.30), 0 6px 18px rgba(79,140,255,0.15);
    }

    /* ── 全局左侧活动栏 ─────────────────────── */
    .app-sidebar {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      box-shadow: 2px 0 12px rgba(0,0,0,0.15);
    }
    .dark .app-sidebar {
      background: linear-gradient(180deg, #0b0e18 0%, #050810 100%);
    }
    .side-nav-item {
      position: relative;
      transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    .side-nav-item:hover {
      background: rgba(255,255,255,0.06);
      color: #e2e8f0;
    }
    .side-nav-item.active {
      background: linear-gradient(135deg, rgba(79,140,255,0.22), rgba(139,92,246,0.22));
      color: #93c5fd;
    }
    .side-nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 10px; bottom: 10px; width: 3px;
      background: linear-gradient(180deg, #4f8cff, #7c3aed);
      border-radius: 0 3px 3px 0;
      box-shadow: 0 0 8px rgba(79,140,255,0.5);
    }

    /* ── 暗色主题 ────────────────────────────────────────── */
    .dark body { color: #e2e8f0; }
    .dark .topbar, .dark .main-panel { @apply bg-[#111827] border-[#1e293b]; }
    .dark .sub-panel { @apply bg-[#0b1324] border-[#1e293b]; }
    .dark input, .dark textarea, .dark select { @apply bg-[#0b1324] border-[#1e293b] text-slate-200; }
    .dark .skill-card { @apply bg-[#0b1324] border-[#1e293b]; }
    .dark .skill-card:hover { @apply bg-[#111a2e]; border-color: rgba(79,140,255,0.45); }
    .dark .skill-card.active { background: rgba(79,140,255,0.10) !important; border-color: rgba(79,140,255,0.5) !important; }

    /* ── 步骤流 ─────────────────────────────────── */
    .step-item {
      @apply rounded-xl border px-4 py-3 transition-all;
    }
    .step-item.step-thought { @apply bg-slate-50 dark:bg-[#0b1324] border-slate-200 dark:border-[#1e293b]; }
    .step-item.step-exec { @apply bg-blue-50/60 dark:bg-blue-500/5 border-blue-200/70 dark:border-blue-500/20; }
    .step-item.step-exec.running { @apply border-blue-400 shadow-sm; }
    .step-item.step-exec.error { @apply bg-red-50/60 dark:bg-red-500/5 border-red-300/70 dark:border-red-500/30; }
    /* playbook step-started 行 */
    .step-item.step-playbook { @apply bg-slate-50/80 dark:bg-[#0b1324] border-slate-200/60 dark:border-[#1e293b] py-2; }
    .step-item.step-playbook.verified { @apply border-emerald-200 dark:border-emerald-500/25 bg-emerald-50/30 dark:bg-emerald-500/5; }
    .step-item.step-playbook.failed { @apply border-red-200 dark:border-red-500/25 bg-red-50/30 dark:bg-red-500/5; }
    /* AI rescue 横幅 */
    .rescue-banner { @apply rounded-xl border border-amber-200 dark:border-amber-500/30 bg-amber-50/60 dark:bg-amber-500/5 px-4 py-2.5 flex items-center gap-2 text-[11px] text-amber-700 dark:text-amber-300; }
    /* 完成摘要条 */
    .run-summary { @apply rounded-xl border border-slate-200 dark:border-[#1e293b] bg-slate-50 dark:bg-[#0b1324] px-4 py-3 flex items-center gap-3 text-[11px] text-slate-500 dark:text-slate-400; }

    /* ── 渲染卡 / 交互卡 ──────────────────── */
    .render-card { @apply rounded-xl border bg-white dark:bg-[#0b1324] shadow-sm; }
    .render-card.level-info    { @apply border-slate-200 dark:border-[#1e293b]; }
    .render-card.level-success { @apply border-emerald-200 dark:border-emerald-500/30 bg-emerald-50/40 dark:bg-emerald-500/5; }
    .render-card.level-warning { @apply border-amber-200 dark:border-amber-500/30 bg-amber-50/40 dark:bg-amber-500/5; }
    .render-card.level-error   { @apply border-red-200 dark:border-red-500/30 bg-red-50/40 dark:bg-red-500/5; }

    .ask-card { @apply rounded-xl border-2 border-dashed border-amber-300 dark:border-amber-500/40 bg-amber-50/40 dark:bg-amber-500/5 p-5 shadow-sm; }
    .ask-card.answered { @apply border-slate-200 dark:border-[#1e293b] bg-slate-50 dark:bg-[#0b1324] border-solid opacity-70; }

    /* ── 交互选项卡片 ──────────────────────── */
    .interact-option {
      @apply w-full text-left px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700
             bg-white dark:bg-[#0b1324] transition-all cursor-pointer;
    }
    .interact-option:hover {
      @apply border-blue-400 dark:border-blue-500 shadow-md;
      transform: translateY(-1px);
    }
    .interact-option:active { transform: translateY(0); }

    /* ── 表格样式 ────────────────────── */
    .result-table { @apply w-full text-xs border-collapse; }
    .result-table th, .result-table td {
      @apply px-3 py-2 text-left border-b border-slate-100 dark:border-[#1e293b];
    }
    .result-table th { @apply bg-slate-50 dark:bg-[#0d1629] text-[10px] uppercase tracking-wide text-slate-500 dark:text-slate-400 font-semibold; }
    .result-table tbody tr:hover { @apply bg-slate-50/80 dark:bg-slate-800/30; }

    /* ── 思考 pulse ─────────────── */
    @keyframes soft-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.45; }
    }
    .thinking-pulse { animation: soft-pulse 1.5s ease-in-out infinite; }

    /* ── 代码块 ────────────── */
    .exec-cmd {
      @apply font-mono text-[11px] text-slate-100 bg-slate-900/95 rounded-md px-3 py-2 overflow-x-auto;
    }
    .exec-output {
      @apply font-mono text-[11px] text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-[#0d1629] rounded-md px-3 py-2 mt-2 whitespace-pre-wrap max-h-48 overflow-y-auto;
    }
  </style>
</head>

            <div class="text-base font-bold text-slate-700 dark:text-slate-200 flex items-center gap-1.5">

  <script>window.LIBRARY_KIND = 'playbook';</script>

  <script>
    const themeBtn = document.getElementById('theme-toggle-btn');
    const themeIcon = document.getElementById('theme-icon');
    const htmlEl = document.documentElement;
    if (localStorage.getItem('1shell-theme') === 'dark') {
      htmlEl.classList.add('dark');
      themeIcon.textContent = '\u2600';
    } else {
      themeIcon.textContent = '\uD83C\uDF19';
    }
    themeBtn.addEventListener('click', () => {
      const isDark = htmlEl.classList.toggle('dark');
      themeIcon.textContent = isDark ? '\u2600' : '\uD83C\uDF19';
      localStorage.setItem('1shell-theme', isDark ? 'dark' : 'light');
    });
  </script>
  <script src="ai-fab.js"></script>
