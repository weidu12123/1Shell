<html lang="zh-CN">
<head>
  <script>if(localStorage.getItem("1shell-theme")==="dark"||(window.matchMedia&&!localStorage.getItem("1shell-theme")&&window.matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark")}</script><!-- theme-flash-prevent -->
  <meta charset="UTF-8" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            shell: { panel: '#f8fafc', accent: '#4f8cff', purple: '#7c3aed', success: '#059669', warn: '#d97706', danger: '#dc2626' },
          },

  <style type="text/tailwindcss">
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif; }
    .hidden { display: none !important; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

    .app-sidebar { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); box-shadow: 2px 0 12px rgba(0,0,0,0.15); }
    .dark .app-sidebar { background: linear-gradient(180deg, #0b0e18 0%, #050810 100%); }
    .side-nav-item { position: relative; transition: all 0.2s cubic-bezier(0.4,0,0.2,1); }
    .side-nav-item:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
    .side-nav-item.active { background: linear-gradient(135deg, rgba(79,140,255,0.22), rgba(139,92,246,0.22)); color: #93c5fd; }
    .side-nav-item.active::before { content:''; position:absolute; left:0; top:10px; bottom:10px; width:3px; background:linear-gradient(180deg,#4f8cff,#7c3aed); border-radius:0 3px 3px 0; box-shadow:0 0 8px rgba(79,140,255,0.5); }

    .dark body { color: #e2e8f0; }
    .dark .topbar, .dark .main-panel { @apply bg-[#111827] border-[#1e293b]; }
    .dark input, .dark select { @apply bg-[#0b1324] border-[#1e293b] text-slate-200; }

    /* ── 表格 ────────────── */
    .ct-table { @apply w-full text-xs border-collapse; }
    .ct-table th, .ct-table td { @apply px-3 py-2.5 text-left border-b border-slate-100 dark:border-[#1e293b]; }
    .ct-table th { @apply bg-slate-50 dark:bg-[#0d1629] text-[10px] uppercase tracking-wide text-slate-500 dark:text-slate-400 font-semibold sticky top-0 z-10; }
    .ct-table tbody tr { @apply transition-colors; }
    .ct-table tbody tr:hover { @apply bg-blue-50/40 dark:bg-blue-500/5; }
    .ct-table tbody tr.row-flash { animation: row-flash 1s ease-out; }
    @keyframes row-flash { 0% { background: rgba(34,197,94,0.15); } 100% { background: transparent; } }

    /* ── 状态 badge ──────── */
    .badge { @apply inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full; }
    .badge-running  { @apply bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-400; }
    .badge-exited   { @apply bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-400; }
    .badge-paused   { @apply bg-amber-100 text-amber-700 dark:bg-amber-500/15 dark:text-amber-400; }
    .badge-loading  { @apply bg-blue-100 text-blue-600 dark:bg-blue-500/15 dark:text-blue-400; }
    .badge-protected { @apply bg-slate-100 text-slate-400 dark:bg-slate-800 dark:text-slate-500; }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 6px;
    }
    .dark .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #263348 50%, #1e293b 75%);
      background-size: 800px 100%;
    }

    /* ── 操作按钮 ────── */
    .act-btn {
      @apply inline-flex items-center gap-1 text-[10px] px-2.5 py-1.5 rounded-lg border transition-all cursor-pointer select-none;
    }
    .act-btn:hover { @apply shadow-sm; transform: translateY(-1px); }
    .act-btn:active { transform: translateY(0); }
    .act-btn-default { @apply border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 hover:border-blue-400; }
    .act-btn-danger { @apply border-red-200 dark:border-red-500/30 text-red-500 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 hover:border-red-400; }
    .act-btn-primary { @apply border-blue-200 dark:border-blue-500/30 bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-500/20; }

    /* ── Modal ────────── */
    .modal-backdrop { @apply fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-center justify-center; animation: fadein 0.15s ease; }
    .modal-box { @apply bg-white dark:bg-[#111827] rounded-2xl border border-slate-200 dark:border-[#1e293b] shadow-2xl w-full max-w-lg mx-4; animation: slideup 0.2s ease; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideup { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Slide panel ──── */
    .slide-panel { @apply fixed top-0 right-0 bottom-0 z-50 w-full max-w-xl bg-white dark:bg-[#111827] border-l border-slate-200 dark:border-[#1e293b] shadow-2xl; animation: slidein 0.25s ease; }
    .slide-backdrop { @apply fixed inset-0 z-40 bg-black/30; animation: fadein 0.15s ease; }
    @keyframes slidein { from { transform: translateX(100%); } to { transform: translateX(0); } }

    /* ── 摘要卡片 ──────── */
    .stat-card { @apply rounded-xl border border-slate-200 dark:border-[#1e293b] bg-white dark:bg-[#0b1324] px-4 py-3 min-w-0; }
  </style>
</head>

        <a href="audit.html" class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium" title="审计日志"><span class="text-lg">&#128203;</span><span>审计</span></a>

      <div class="shrink-0 flex flex-col gap-1 px-1">
        <div class="mx-3 h-px bg-slate-700/60 mb-1"></div>
        <button class="side-nav-item flex flex-col items-center gap-0.5 py-2.5 rounded-lg text-slate-400 text-[10px] font-medium" title="主题" id="theme-toggle-btn"><span class="text-base" id="theme-icon">&#9728;</span><span>主题</span></button>

    <!-- 主区域 -->
    <div class="flex flex-col flex-1 min-w-0 p-2 gap-2">

        <select id="host-select" class="h-8 px-2 rounded-lg border border-slate-200 bg-slate-50 text-xs outline-none focus:border-blue-400 min-w-[140px]">

        <button id="btn-refresh" class="act-btn act-btn-primary" title="刷新">&#8635; 刷新</button>
      </header>

      <!-- 摘要统计条 -->
      <div class="shrink-0 grid grid-cols-4 gap-2" id="stats-bar">
        <div class="stat-card"><div class="text-[10px] text-slate-400 uppercase tracking-wide mb-0.5">运行中</div><div class="text-lg font-bold text-emerald-600 dark:text-emerald-400" id="stat-running">-</div></div>
        <div class="stat-card"><div class="text-[10px] text-slate-400 uppercase tracking-wide mb-0.5">已停止</div><div class="text-lg font-bold text-slate-500" id="stat-stopped">-</div></div>
        <div class="stat-card"><div class="text-[10px] text-slate-400 uppercase tracking-wide mb-0.5">总计</div><div class="text-lg font-bold text-slate-700 dark:text-slate-200" id="stat-total">-</div></div>
        <div class="stat-card"><div class="text-[10px] text-slate-400 uppercase tracking-wide mb-0.5">镜像数</div><div class="text-lg font-bold text-blue-600 dark:text-blue-400" id="stat-images">-</div></div>
      </div>

      <!-- 主面板 -->
      <main class="main-panel flex-1 flex flex-col min-h-0 bg-shell-panel rounded-2xl border border-slate-200 shadow-sm overflow-hidden">

        </div>

        <!-- 表格区域 -->
        <div class="flex-1 overflow-auto" id="table-wrap">

                <th>名称</th>
                <th>镜像</th>
                <th>状态</th>
                <th>端口</th>
                <th>创建时间</th>

              <tr><td><div class="skeleton h-4 w-36"></div></td><td><div class="skeleton h-4 w-44"></div></td><td><div class="skeleton h-4 w-20"></div></td><td><div class="skeleton h-4 w-20"></div></td><td><div class="skeleton h-4 w-24"></div></td><td><div class="skeleton h-4 w-32 ml-auto"></div></td></tr>
              <tr><td><div class="skeleton h-4 w-24"></div></td><td><div class="skeleton h-4 w-32"></div></td><td><div class="skeleton h-4 w-20"></div></td><td><div class="skeleton h-4 w-28"></div></td><td><div class="skeleton h-4 w-24"></div></td><td><div class="skeleton h-4 w-32 ml-auto"></div></td></tr>
              <tr><td><div class="skeleton h-4 w-30"></div></td><td><div class="skeleton h-4 w-38"></div></td><td><div class="skeleton h-4 w-20"></div></td><td><div class="skeleton h-4 w-24"></div></td><td><div class="skeleton h-4 w-24"></div></td><td><div class="skeleton h-4 w-32 ml-auto"></div></td></tr>

          </table>

      </main>
    </div>

  <!-- Modal 容器 -->
  <div id="modal-root"></div>
  <!-- Slide panel 容器 -->
  <div id="slide-root"></div>

  <script src="shared.js"></script>
  <script src="skill-client.js"></script>
  <script src="containers-page.js"></script>
  <script>
    const themeBtn = document.getElementById('theme-toggle-btn');
    const themeIcon = document.getElementById('theme-icon');
    const htmlEl = document.documentElement;
    if (localStorage.getItem('1shell-theme') === 'dark') { htmlEl.classList.add('dark'); themeIcon.textContent = '\u2600'; } else { themeIcon.textContent = '\uD83C\uDF19'; }
    themeBtn.addEventListener('click', () => { const d = htmlEl.classList.toggle('dark'); themeIcon.textContent = d ? '\u2600' : '\uD83C\uDF19'; localStorage.setItem('1shell-theme', d ? 'dark' : 'light'); });
  </script>
