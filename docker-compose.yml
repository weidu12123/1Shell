services:
  1shell:
    build:
      context: .
      network: host
    container_name: 1shell
    restart: unless-stopped
    ports:
      - "${PORT:-3301}:3301"
    volumes:
      - ./data:/app/data
      # 将宿主机的 AI CLI 工具挂载进容器（只读），无需在镜像内安装
      - /root/.claude:/root/.claude
      - /usr/local/bin/claude:/usr/local/bin/claude:ro
      - /usr/local/lib/node_modules/@anthropic-ai:/usr/local/lib/node_modules/@anthropic-ai:ro
      - /usr/bin/opencode:/usr/bin/opencode:ro
      - /usr/lib/node_modules/opencode-ai:/usr/lib/node_modules/opencode-ai:ro
      - /usr/bin/codex:/usr/bin/codex:ro
      - /usr/lib/node_modules/@openai:/usr/lib/node_modules/@openai:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
